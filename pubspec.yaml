name: ebstat_app
description: Electrochemistry Bluetooth Stat — voltammetry measurement app for XIAO nRF52840.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE connectivity
  flutter_blue_plus: ^1.32.12

  # Charting
  fl_chart: ^0.68.0

  # State management
  provider: ^6.1.2

  # CSV export
  csv: ^6.0.0

  # File system access
  path_provider: ^2.1.3

  # Share / save file
  share_plus: ^9.0.0

  # Multi-sheet xlsx export
  excel: ^4.0.0

  # Runtime permissions (BLE, storage)
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
